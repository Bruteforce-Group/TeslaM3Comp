global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'core'
    static_configs:
      - targets: ['core:8000']
    metrics_path: '/metrics'

  - job_name: 'llm'
    static_configs:
      - targets: ['llm:8080']
    metrics_path: '/metrics'

  - job_name: 'opencv'
    static_configs:
      - targets: ['opencv:8081']
    metrics_path: '/metrics'

  - job_name: 'obd'
    static_configs:
      - targets: ['obd:8082']
    metrics_path: '/metrics'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
