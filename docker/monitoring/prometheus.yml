global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'core'
    static_configs:
      - targets: ['core:8000']

  - job_name: 'llm'
    static_configs:
      - targets: ['llm:8080']

  - job_name: 'opencv'
    static_configs:
      - targets: ['opencv:8081']

  - job_name: 'obd'
    static_configs:
      - targets: ['obd:8082']

  - job_name: 'database'
    static_configs:
      - targets: ['database:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
